<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLIVIA // BOTH SIDES BRIEF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #00ff41;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 12px;
    position: relative;
  }
  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.02) 2px, rgba(0,255,65,0.02) 4px);
    pointer-events: none;
    z-index: 1000;
  }
  .header {
    text-align: center;
    padding: 16px 0 10px;
    border-bottom: 2px solid #00ff41;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 20px;
    letter-spacing: 4px;
    color: #00ff41;
    text-shadow: 0 0 15px #00ff41;
  }
  .cursor {
    display: inline-block;
    width: 10px;
    height: 18px;
    background: #00ff41;
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .dateline {
    color: #005a1f;
    font-size: 11px;
    letter-spacing: 3px;
    margin-top: 6px;
  }
  .story-block {
    border: 1px solid #004a15;
    padding: 14px;
    margin-bottom: 16px;
    background: #001a06;
    position: relative;
  }
  .story-block::before {
    content: '> STORY_' attr(data-idx) ':';
    display: block;
    color: #00aa2a;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .story-headline {
    color: #00ff41;
    font-size: 14px;
    margin-bottom: 6px;
    text-shadow: 0 0 5px rgba(0,255,65,0.4);
  }
  .story-meta {
    color: #005a1f;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    border-bottom: 1px dashed #003a10;
    padding-bottom: 8px;
  }
  .arg-row {
    margin-bottom: 10px;
    padding-left: 8px;
    border-left: 3px solid #003a10;
  }
  .arg-row.for-row { border-left-color: #00ff41; }
  .arg-row.against-row { border-left-color: #ff4141; }
  .arg-row.tension-row { border-left-color: #ffaa00; }
  .arg-label {
    font-size: 10px;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .for-row .arg-label { color: #00aa2a; }
  .against-row .arg-label { color: #aa2a2a; }
  .tension-row .arg-label { color: #aa7700; }
  .arg-text { color: #00cc33; font-size: 12px; line-height: 1.5; }
  .story-divider {
    text-align: center;
    color: #003a10;
    letter-spacing: 4px;
    font-size: 11px;
    margin: 4px 0 0;
  }
  .awaiting {
    text-align: center;
    padding: 60px 20px;
    color: #00aa2a;
    font-size: 18px;
    letter-spacing: 4px;
  }
  .awaiting .sub { font-size: 12px; color: #003a10; margin-top: 10px; letter-spacing: 2px; }
  .stats-bar {
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #003a10;
    background: #001a06;
  }
  .stats-bar h3 { color: #005a1f; font-size: 10px; letter-spacing: 3px; margin-bottom: 8px; }
  .stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { color: #00aa2a; font-size: 11px; }
  .stat span { color: #00ff41; }
  .footer {
    margin-top: 16px;
    padding-top: 10px;
    border-top: 1px solid #003a10;
    color: #005a1f;
    font-size: 10px;
    text-align: center;
    letter-spacing: 2px;
  }
  @media (max-width: 600px) {
    .header h1 { font-size: 15px; letter-spacing: 2px; }
    .story-headline { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 OLIVIA // BOTH SIDES BRIEF<span class="cursor"></span></h1>
  <div class="dateline" id="dateline">LOADING...</div>
</div>

<div id="app"></div>

<script>
const DATA = {"updated":"2026-03-29T03:19:53.878Z","date":"Saturday, March 28, 2026","category":"technology","stories":[],"autoResearch":{"runCount":0,"baseline":null,"bestConfig":{"lm_timeout_ms":30000,"max_tokens":200,"headlines_count":5},"improvements":0}};

function render(d) {
  const dateEl = document.getElementById('dateline');
  dateEl.textContent = d.date || new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();

  const app = document.getElementById('app');

  if (!d.stories || d.stories.length === 0) {
    app.innerHTML = `<div class="awaiting">[ AWAITING SIGNAL... ]<div class="sub">NO INTELLIGENCE DATA YET<br>SYSTEM WILL UPDATE AUTOMATICALLY</div></div>`;
  } else {
    let html = '';
    d.stories.forEach((story, idx) => {
      const n = String(idx + 1).padStart(2, '0');
      html += `<div class="story-block" data-idx="${n}">
        <div class="story-headline">${escHtml(story.headline || '')}</div>
        <div class="story-meta">${escHtml(story.source || '')} · ${escHtml(story.age || '')} · CAT: ${escHtml((d.category||'').toUpperCase())}</div>
        ${story.for ? `
        <div class="arg-row for-row">
          <div class="arg-label">[FOR]</div>
          <div class="arg-text">${escHtml(story.for)}</div>
        </div>
        <div class="arg-row against-row">
          <div class="arg-label">[AGAINST]</div>
          <div class="arg-text">${escHtml(story.against || '')}</div>
        </div>
        <div class="arg-row tension-row">
          <div class="arg-label">[TENSION]</div>
          <div class="arg-text">${escHtml(story.tension || '')}</div>
        </div>
        ` : `<div style="color:#005a1f;font-size:11px;padding:8px">[ LM STUDIO OFFLINE — DEBATE UNAVAILABLE ]</div>`}
        <div class="story-divider">────────────────────────────────────</div>
      </div>`;
    });
    app.innerHTML = html;
  }

  // Autoresearch stats
  const ar = d.autoResearch || {};
  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="stats-bar">
      <h3>⚗ AUTORESEARCH STATUS</h3>
      <div class="stats-row">
        <div class="stat">RUNS: <span>${ar.runCount || 0}</span></div>
        <div class="stat">BASELINE: <span>${ar.baseline || 'N/A'}</span></div>
        <div class="stat">BEST CONFIG: <span>${ar.bestConfig ? JSON.stringify(ar.bestConfig).slice(0,50) : 'DEFAULT'}</span></div>
        <div class="stat">IMPROVEMENTS: <span>${ar.improvements || 0}</span></div>
      </div>
    </div>
    <div class="footer">
      LAST UPDATED: ${d.updated || new Date().toISOString()} &nbsp;·&nbsp; AUTO-REFRESH: 5MIN
    </div>
  `);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

try {
  render(DATA);
} catch(e) {
  document.getElementById('app').innerHTML = `<div class="awaiting">[ ERROR ]<div class="sub">${e.message}</div></div>`;
}

setTimeout(() => location.reload(), 300000);
</script>
</body>
</html>
