<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>OLIVIA // BOTH SIDES BRIEF</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#000;color:#00ff41;font-family:'Courier New',monospace;font-size:13px;min-height:100vh;padding:12px}body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.02) 2px,rgba(0,255,65,.02) 4px);pointer-events:none;z-index:1000}.header{text-align:center;padding:16px 0 10px;border-bottom:2px solid #00ff41;margin-bottom:20px}.header h1{font-size:20px;letter-spacing:4px;color:#00ff41;text-shadow:0 0 15px #00ff41}.cursor{display:inline-block;width:10px;height:18px;background:#00ff41;margin-left:4px;vertical-align:middle;animation:blink .8s step-end infinite}@keyframes blink{50%{opacity:0}}.dateline{color:#005a1f;font-size:11px;letter-spacing:3px;margin-top:6px}.story-block{border:1px solid #004a15;padding:14px;margin-bottom:16px;background:#001a06;position:relative}.story-block::before{content:'> STORY_' attr(data-idx) ':';display:block;color:#00aa2a;font-size:11px;letter-spacing:2px;margin-bottom:8px}.story-headline{color:#00ff41;font-size:14px;margin-bottom:6px}.story-meta{color:#005a1f;font-size:10px;letter-spacing:2px;margin-bottom:12px;border-bottom:1px dashed #003a10;padding-bottom:8px}.arg-row{margin-bottom:10px;padding-left:8px;border-left:3px solid #003a10}.for-row{border-left-color:#00ff41}.against-row{border-left-color:#ff4141}.tension-row{border-left-color:#ffaa00}.arg-label{font-size:10px;letter-spacing:3px;margin-bottom:4px}.for-row .arg-label{color:#00aa2a}.against-row .arg-label{color:#aa2a2a}.tension-row .arg-label{color:#aa7700}.arg-text{color:#00cc33;font-size:12px;line-height:1.5}.awaiting{text-align:center;padding:60px 20px;color:#00aa2a;font-size:18px;letter-spacing:4px}.awaiting .sub{font-size:12px;color:#003a10;margin-top:10px;letter-spacing:2px}.stats-bar{margin-top:20px;padding:12px;border:1px solid #003a10;background:#001a06}.stats-bar h3{color:#005a1f;font-size:10px;letter-spacing:3px;margin-bottom:8px}.stats-row{display:flex;gap:20px;flex-wrap:wrap}.stat{color:#00aa2a;font-size:11px}.stat span{color:#00ff41}.footer{margin-top:16px;padding-top:10px;border-top:1px solid #003a10;color:#005a1f;font-size:10px;text-align:center;letter-spacing:2px}</style></head>
<body>
<div class="header"><h1>🧠 OLIVIA // BOTH SIDES BRIEF<span class="cursor"></span></h1><div class="dateline">SATURDAY, MARCH 28, 2026</div></div>
<div id="app"></div>
<script>
const DATA={"updated":"2026-03-29T03:30:57.160Z","date":"Saturday, March 28, 2026","category":"business","stories":[{"headline":"Financial markets fall to new 2026 low as oil rises again - The Washington Post","source":"The Washington Post","age":"1d ago","for":"","against":"","tension":""},{"headline":"Suspects ID’d in case of missing American Airlines flight attendant in Colombia - NewsNation","source":"Newsnationnow.com","age":"1d ago","for":"","against":"","tension":""},{"headline":"EPA issues record biofuel blending requirements - The Hill","source":"The Hill","age":"1d ago","for":"","against":"","tension":""},{"headline":"The Cushion Is Gone and the Oil Market Is Now Exposed - Crude Oil Prices Today | OilPrice.com","source":"OilPrice.com","age":"1d ago","for":"","against":"","tension":""},{"headline":"Outbreak linked to raw cheese grows; 9 cases total, one with kidney failure - Ars Technica","source":"Ars Technica","age":"1d ago","for":"","against":"","tension":""}],"autoResearch":{"runCount":0,"baseline":null,"bestConfig":{"lm_timeout_ms":30000,"max_tokens":200,"headlines_count":5},"improvements":0}};
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(d){
  const app=document.getElementById('app');
  if(!d.stories||d.stories.length===0){app.innerHTML='<div class="awaiting">[ AWAITING SIGNAL... ]<div class="sub">NO INTELLIGENCE DATA YET</div></div>';}
  else{let html='';d.stories.forEach((s,i)=>{const n=String(i+1).padStart(2,'0');html+='<div class="story-block" data-idx="'+n+'"><div class="story-headline">'+escHtml(s.headline)+'</div><div class="story-meta">'+escHtml(s.source)+' · '+escHtml(s.age)+'</div>'+(s.for?'<div class="arg-row for-row"><div class="arg-label">[FOR]</div><div class="arg-text">'+escHtml(s.for)+'</div></div><div class="arg-row against-row"><div class="arg-label">[AGAINST]</div><div class="arg-text">'+escHtml(s.against||'')+'</div></div><div class="arg-row tension-row"><div class="arg-label">[TENSION]</div><div class="arg-text">'+escHtml(s.tension||'')+'</div></div>':'<div style="color:#005a1f;font-size:11px;padding:8px">[ LM STUDIO OFFLINE ]</div>')+'</div>';});app.innerHTML=html;}
  const ar=d.autoResearch||{};
  document.getElementById('app').insertAdjacentHTML('beforeend','<div class="stats-bar"><h3>⚗ AUTORESEARCH</h3><div class="stats-row"><div class="stat">RUNS: <span>'+( ar.runCount||0)+'</span></div><div class="stat">IMPROVEMENTS: <span>'+(ar.improvements||0)+'</span></div></div></div><div class="footer">UPDATED: '+(d.updated||new Date().toISOString())+' · AUTO-REFRESH: 5MIN</div>');
}
try{render(DATA);}catch(e){document.getElementById('app').innerHTML='<div class="awaiting">[ ERROR ]<div class="sub">'+e.message+'</div></div>';}
setTimeout(()=>location.reload(),300000);
</script></body></html>
